spring.application.name=RMJHallAdmin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- DATABASE CONNECTION CONFIGURATION ---
# Uses standard Spring Boot datasource environment variables injected by Railway.
# Falls back to local defaults when the variables are absent.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/RMJHALL}

# Pulls production credentials from Railway; falls back to local values if absent.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

# --- ORM / HIBERNATE CONFIGURATION ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update