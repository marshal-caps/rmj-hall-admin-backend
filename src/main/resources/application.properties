spring.application.name=RMJHallAdmin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- DATABASE CONNECTION CONFIGURATION ---
# Uses the individual connection component variables exported by Railway's MySQL service.
# Falls back to local defaults when the variables are absent.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:RMJHALL}

# Pulls production credentials from Railway's MySQL service; falls back to local values if absent.
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}

# --- ORM / HIBERNATE CONFIGURATION ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update