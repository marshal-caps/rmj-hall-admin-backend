spring.application.name=RMJHallAdmin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- DATABASE CONNECTION HYBRID CONFIGURATION ---
# On Railway: Prepends 'jdbc:' to the dynamic 'mysql://...' URL string.
# Locally: Evaluates to 'jdbc:mysql://localhost:3306/RMJHALL' when MYSQL_URL is absent.
spring.datasource.url=jdbc:${MYSQL_URL:mysql://localhost:3306/RMJHALL}

# Pulls production credentials from Railway; falls back to local values if absent.
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}

# --- ORM / HIBERNATE CONFIGURATION ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update