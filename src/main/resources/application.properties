spring.application.name=RMJHallAdmin

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tells Spring to look for Railway's internal variables, fallback to local machine
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/RMJHALL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update